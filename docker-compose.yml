services:
  homelab-status:
    image: ghcr.io/mark0025/homelab-status:latest
    container_name: homelab-status
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
      - STATUS_DB_PATH=/data/status.db
      - MDOPS_DB_PATH=/data/mdops-mac.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Cap logs so one chatty container can't fill the host disk (LEGO rule;
    # voice-app filled 114GB once). Issue #22.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - homelab_status_data:/data
      - /home/mark/00Myhomelab/MDDPY-MAC-GLOBAL/data-mac/mdops-mac.db:/data/mdops-mac.db:ro
    networks:
      - nginx-network
    # NOTE: deliberately NO com.centurylinklabs.watchtower.enable label — that
    # label is already used by 6 OTHER containers on this host, so label-scoping
    # would auto-update all of them. We scope by NAME below instead. (#19)

  # Scoped auto-deploy (#19): the maintained watchtower fork (the original
  # containrrr/watchtower is abandoned + ships an ancient Docker API client that
  # modern daemons reject). It watches ONLY the 'homelab-status' container passed
  # as an arg — NOT label-scoped (the shared label hits 6 unrelated containers),
  # NOT host-wide. Blast radius = exactly this one container. Polls every 5 min.
  watchtower-homelab-status:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower-homelab-status
    restart: unless-stopped
    command: ["homelab-status"]   # watch ONLY this container, by name
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  homelab_status_data:

networks:
  nginx-network:
    external: true
